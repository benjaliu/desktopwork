name: Build DesktopWork

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain-channel: "stable"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile
        working-directory: shell

      - name: Build Tauri (Windows)
        run: pnpm tauri build
        working-directory: shell

      - name: Upload Windows exe
        uses: actions/upload-artifact@v4
        with:
          name: desktopwork-windows
          path: shell/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 7

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain-channel: "stable"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile
        working-directory: shell

      - name: Build Tauri (macOS)
        run: pnpm tauri build
        working-directory: shell

      - name: Upload macOS dmg
        uses: actions/upload-artifact@v4
        with:
          name: desktopwork-macos
          path: shell/src-tauri/target/release/bundle/dmg/*.dmg
          retention-days: 7