name: Build DesktopWork

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain-channel: "stable"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm

      # Install shell deps (tauri cli)
      - name: Install shell deps
        run: pnpm install --no-lockfile --ignore-scripts
        working-directory: shell

      # Install desktop-agent deps (includes @openclaw/* from workspace)
      - name: Install desktop-agent deps
        run: pnpm install --no-lockfile --ignore-scripts
        working-directory: desktop-agent

      # Lint = tsc --noEmit (待加 biome/eslint)
      - name: Lint
        run: pnpm run typecheck
        working-directory: desktop-agent

      # TypeScript type-check then compile to JavaScript
      - name: Compile TypeScript
        run: pnpm run build
        working-directory: desktop-agent

      - name: Deploy server bundle (auto-collects all deps incl. claude binary)
        run: pnpm deploy --filter desktop-agent --prod --legacy shell/src-tauri/server
        working-directory: .

      - name: Debug Tauri setup
        run: |
          pnpm tauri --version
          pnpm tauri info 2>&1
          ls -la src-tauri/ 2>&1
          ls -la src-tauri/server/ 2>&1 | head -10
          ls -la src-tauri/target/ 2>&1 | head -5
        working-directory: shell

      - name: Build Tauri (Windows)
        run: |
          set -o pipefail
          pnpm tauri build --verbose 2>&1 | tee /tmp/tauri-build-log.txt
        working-directory: shell

      - name: Upload Windows build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-log-windows
          path: /tmp/tauri-build-log.txt
          retention-days: 7

      - name: Upload Windows exe
        uses: actions/upload-artifact@v4
        with:
          name: desktopwork-windows
          path: shell/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 7

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain-channel: "stable"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install shell deps
        run: pnpm install --no-lockfile --ignore-scripts
        working-directory: shell

      - name: Install desktop-agent deps
        run: pnpm install --no-lockfile --ignore-scripts
        working-directory: desktop-agent

      # Lint = tsc --noEmit (待加 biome/eslint)
      - name: Lint
        run: pnpm run typecheck
        working-directory: desktop-agent

      - name: Compile TypeScript
        run: pnpm run build
        working-directory: desktop-agent

      - name: Deploy server bundle (auto-collects all deps incl. claude binary)
        run: pnpm deploy --filter desktop-agent --prod --legacy shell/src-tauri/server
        working-directory: .

      - name: Debug Tauri setup (macOS)
        run: |
          pnpm tauri --version
          pnpm tauri info 2>&1
          ls -la src-tauri/ 2>&1
          ls -la src-tauri/server/ 2>&1 | head -10
          ls -la src-tauri/target/ 2>&1 | head -5
        working-directory: shell

      - name: Build Tauri (macOS)
        run: |
          set -o pipefail
          pnpm tauri build --verbose 2>&1 | tee /tmp/tauri-build-log.txt
        working-directory: shell

      - name: Upload macOS build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-log-macos
          path: /tmp/tauri-build-log.txt
          retention-days: 7

      - name: Upload macOS dmg
        uses: actions/upload-artifact@v4
        with:
          name: desktopwork-macos
          path: shell/src-tauri/target/release/bundle/dmg/*.dmg
          retention-days: 7
