name: Build DesktopWork

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain-channel: "stable"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm

      # Install shell deps (tauri cli)
      - name: Install shell deps
        run: pnpm install --no-lockfile --ignore-scripts
        working-directory: shell

      # Install desktop-agent deps (includes @openclaw/* from workspace)
      - name: Install desktop-agent deps
        run: pnpm install --no-lockfile --ignore-scripts
        working-directory: desktop-agent

      # Compile TypeScript → JavaScript
      - name: Compile TypeScript
        run: pnpm run build
        working-directory: desktop-agent

      # Copy server files into shell/src-tauri/ for bundling
      # At runtime these will be in the same dir as the .exe
      # node_modules/@openclaw/ is included (symlinks resolved by xcopy)
      # package.json is included for reference but node_modules is self-contained
      - name: Copy server bundle
        run: |
          mkdir shell\src-tauri\server
          xcopy /E /I /Y desktop-agent\dist shell\src-tauri\server\dist
          xcopy /E /I /Y desktop-agent\apps shell\src-tauri\server\apps
          xcopy /E /I /Y desktop-agent\node_modules shell\src-tauri\server\node_modules
          copy desktop-agent\package.json shell\src-tauri\server\package.json
        working-directory: .

      - name: Build Tauri (Windows)
        run: pnpm tauri build
        working-directory: shell

      - name: Upload Windows exe
        uses: actions/upload-artifact@v4
        with:
          name: desktopwork-windows
          path: shell/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 7

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain-channel: "stable"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install shell deps
        run: pnpm install --no-lockfile --ignore-scripts
        working-directory: shell

      - name: Install desktop-agent deps
        run: pnpm install --no-lockfile --ignore-scripts
        working-directory: desktop-agent

      - name: Compile TypeScript
        run: pnpm run build
        working-directory: desktop-agent

      - name: Copy server bundle
        run: |
          mkdir -p shell/src-tauri/server/dist
          mkdir -p shell/src-tauri/server/apps
          mkdir -p shell/src-tauri/server/node_modules
          cp -R desktop-agent/dist/* shell/src-tauri/server/dist/
          cp -R desktop-agent/apps/* shell/src-tauri/server/apps/
          cp -R desktop-agent/node_modules/* shell/src-tauri/server/node_modules/
          cp desktop-agent/package.json shell/src-tauri/server/package.json
        working-directory: .

      - name: Build Tauri (macOS)
        run: pnpm tauri build
        working-directory: shell

      - name: Upload macOS dmg
        uses: actions/upload-artifact@v4
        with:
          name: desktopwork-macos
          path: shell/src-tauri/target/release/bundle/dmg/*.dmg
          retention-days: 7
