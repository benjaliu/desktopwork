name: Build DesktopWork

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: dmg
            node-tarball-platform: darwin-arm64
            node-binary-suffix: -aarch64-apple-darwin
          - platform: macos-13
            target: dmg
            node-tarball-platform: darwin-x64
            node-binary-suffix: -x86_64-apple-darwin
          - platform: windows-latest
            target: nsis
            node-tarball-platform: win-x64
            node-binary-suffix: -x86_64-pc-windows-msvc.exe
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # === 1. 工具链 ===
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        run: npm install -g pnpm
        shell: bash

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2.0.0" --locked
        shell: bash

      # === 2. Node sidecar binary 下载 + cache ===
      # Tauri 2 在 bundle 时把 externalBin 里的字面 basename 追加 -<target-triple> 后缀。
      # CI 下载的 Node 二进制必须以同样规则命名，否则 build 报 ExternalBinNotFound。
      #
      # 顺序很关键：先 cache，再 download（只在 cache miss 时），
      # 否则 cache hit 时会用旧文件覆盖刚下载的新文件。
      - name: Cache Node.js binary
        id: cache-node
        uses: actions/cache@v4
        with:
          path: shell/node-binaries/
          key: node-v22.3.0-${{ matrix.target }}
          restore-keys: |
            node-v22-

      - name: Download Node.js binary
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          NODE_VERSION="22.3.0"
          NODE_PLATFORM="${{ matrix.node-tarball-platform }}"
          BINARY_SUFFIX="${{ matrix.node-binary-suffix }}"
          TARBALL="node-v${NODE_VERSION}-${NODE_PLATFORM}"
          mkdir -p shell/node-binaries
          FINAL_NAME="shell/node-binaries/node${BINARY_SUFFIX}"

          if [[ "$RUNNER_OS" == "Windows" ]]; then
            # Windows 用 zip
            curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/${TARBALL}.zip" -o /tmp/node.zip
            unzip -j /tmp/node.zip "${TARBALL}/node.exe" -d shell/node-binaries/
            mv "shell/node-binaries/node.exe" "$FINAL_NAME"
            rm /tmp/node.zip
          else
            # macOS / Linux 用 tar.xz
            curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/${TARBALL}.tar.xz" -o /tmp/node.tar.xz
            tar -xJf /tmp/node.tar.xz -C /tmp
            mv "/tmp/${TARBALL}/bin/node" "$FINAL_NAME"
            chmod +x "$FINAL_NAME"
            rm /tmp/node.tar.xz
          fi

          # ★ size 校验：真 Node binary ≥ 50MB，404 HTML 才 14 字节
          # ★ v0.3.1.5: 用 wc -c 代替 stat -c%s（macOS BSD stat 不认 -c）
          SIZE=$(wc -c < "$FINAL_NAME" | tr -d ' \n')
          if [[ "$SIZE" -lt 1000000 ]]; then
            echo "::error::Downloaded Node binary is $SIZE bytes (< 1MB), probably 404 or empty"
            file "$FINAL_NAME" 2>/dev/null || true
            head -c 200 "$FINAL_NAME" 2>/dev/null || true
            exit 1
          fi

          echo "=== Node binary installed ==="
          ls -la shell/node-binaries/
          "$FINAL_NAME" --version || true
        shell: bash

      # === 3. 装依赖 ===
      - name: Install workspace deps
        run: pnpm install --ignore-scripts
        shell: bash
        # ★ 不带 --no-lockfile，保证可重现

      # === 4. 编译 + 验证 desktop-agent ===
      - name: Typecheck
        run: pnpm -F desktop-agent typecheck
        shell: bash

      - name: Build desktop-agent
        run: pnpm -F desktop-agent build
        shell: bash
        # 产出 desktop-agent/dist/

      # === 5. 准备 bundle 资源（关键步骤） ===
      - name: Deploy server bundle to shell (v0.3.1.8 shamefully-hoist)
        run: |
          # ★ v0.3.1.8: 不用 pnpm deploy（生成 symlink，NSIS 提取时丢失）
          # 改用 cp dist + pnpm install --shamefully-hoist 物理化所有 deps
          # 理由：见 docs/technical/TECH-DESIGN.md §9.13.17

          rm -rf shell/src-tauri/server
          mkdir -p shell/src-tauri/server
          cp -r desktop-agent/dist shell/src-tauri/server/dist
          cp desktop-agent/package.json shell/src-tauri/server/package.json

          cd shell/src-tauri/server
          # --shamefully-hoist 强制所有 deps 提升到 node_modules/ 顶层（npm-style，零 symlink）
          # 跨平台一致：macOS DMG / Linux deb-rpm / Windows NSIS 行为相同
          pnpm install --prod --shamefully-hoist

          cd ../..
          echo "=== server bundle size ==="
          du -sh shell/src-tauri/server
          echo "=== server bundle top-level ==="
          ls shell/src-tauri/server/
          echo "=== expected: dist/ node_modules/ package.json（无 src/ scripts/ apps/） ==="
          echo "=== express sanity check (must be physical dir, not symlink) ==="
          if [ -d shell/src-tauri/server/node_modules/express ] && [ ! -L shell/src-tauri/server/node_modules/express ]; then
            echo "✅ express is a PHYSICAL directory (NSIS-safe)"
            test -f shell/src-tauri/server/node_modules/express/package.json && echo "✅ express/package.json exists"
          else
            echo "❌ express is symlink or missing!"
            ls -la shell/src-tauri/server/node_modules/express
            exit 1
          fi
          echo "=== node_modules top-level (no .pnpm/ should appear) ==="
          ls shell/src-tauri/server/node_modules/ | head -30
          echo "=== Claude SDK binary present? ==="
          find shell/src-tauri/server/node_modules/@anthropic-ai -name "claude" -type f | head -3
        shell: bash

      # === 6. tauri build（产 installer） ===
      - name: Debug before tauri build
        run: |
          echo "=== pwd ==="
          pwd
          echo "=== shell/node-binaries/ ==="
          ls -la shell/node-binaries/ || echo "no node-binaries dir"
          echo "=== file types ==="
          file shell/node-binaries/* 2>/dev/null || echo "no files"
        shell: bash

      - name: Build Tauri app
        run: |
          # dtolnay/rust-toolchain@stable 已把 cargo 加到 PATH，不需 source env
          # ★ 用绝对路径指 config，避免 working-directory 不一致
          cargo tauri build --config shell/src-tauri/tauri.conf.json --verbose
        shell: bash
        # ★ Tauri CLI 看到 bundle.externalBin = ["../node-binaries/node"]
        #   会自动找 shell/node-binaries/node-{当前 target triple}{.exe}
        #   并在 bundle 时重命名为 node-{target-triple} 复制到 resource_dir

      # === 7. 上传产物 ===
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: desktopwork-${{ matrix.target }}
          path: |
            shell/src-tauri/target/release/bundle/${{ matrix.target }}/*.exe
            shell/src-tauri/target/release/bundle/${{ matrix.target }}/*.dmg
          if-no-files-found: error