name: Build DesktopWork

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain-channel: "stable"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm

      # Install shell deps (tauri cli)
      - name: Install shell deps
        run: pnpm install
        working-directory: shell

      # Install desktop-agent deps
      - name: Install desktop-agent deps
        run: pnpm install
        working-directory: desktop-agent

      # Vendor bundles are committed in desktop-agent/vendor/bundles/
      # (user will re-extract and update after OpenClaw submodule init)

      # Compile TypeScript → JavaScript
      - name: Compile TypeScript
        run: pnpm run build
        working-directory: desktop-agent

      # Copy server files into shell/src-tauri/ for bundling
      # At runtime these will be in the same dir as the .exe
      - name: Copy server bundle
        run: |
          mkdir shell\src-tauri\server
          xcopy /E /I /Y desktop-agent\dist shell\src-tauri\server\dist
          xcopy /E /I /Y desktop-agent\vendor\bundles shell\src-tauri\server\vendor\bundles
          xcopy /E /I /Y desktop-agent\node_modules shell\src-tauri\server\node_modules
        working-directory: .

      - name: Build Tauri (Windows)
        run: pnpm tauri build
        working-directory: shell

      - name: Upload Windows exe
        uses: actions/upload-artifact@v4
        with:
          name: desktopwork-windows
          path: shell/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 7

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain-channel: "stable"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install shell deps
        run: pnpm install
        working-directory: shell

      - name: Install desktop-agent deps
        run: pnpm install
        working-directory: desktop-agent

      # Vendor bundles are committed — do not re-extract here

      - name: Compile TypeScript
        run: pnpm run build
        working-directory: desktop-agent

      - name: Copy server bundle
        run: |
          mkdir -p shell/src-tauri/server
          cp -R desktop-agent/dist shell/src-tauri/server/dist
          cp -R desktop-agent/vendor/bundles shell/src-tauri/server/vendor/bundles
          cp -R desktop-agent/node_modules shell/src-tauri/server/node_modules
        working-directory: .

      - name: Build Tauri (macOS)
        run: pnpm tauri build
        working-directory: shell

      - name: Upload macOS dmg
        uses: actions/upload-artifact@v4
        with:
          name: desktopwork-macos
          path: shell/src-tauri/target/release/bundle/dmg/*.dmg
          retention-days: 7
