<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — DesktopWork</title>
  <style>
    body { background: #0f0f0f; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, sans-serif; }
    .login-box { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 32px; width: 360px; }
    .login-box h1 { color: #fff; font-size: 20px; margin-bottom: 8px; }
    .login-box p { color: #666; font-size: 13px; margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; color: #888; margin-bottom: 6px; }
    .form-group input { width: 100%; background: #111; border: 1px solid #333; border-radius: 6px; padding: 10px 12px; color: #e5e5e5; font-size: 14px; }
    .form-group input:focus { outline: none; border-color: #3b82f6; }
    .btn { width: 100%; padding: 10px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; font-weight: 500; }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .error { color: #ef4444; font-size: 13px; margin-top: 12px; display: none; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>DesktopWork</h1>
    <p>Enter any username and password to sign in (stub mode).</p>
    <form id="login-form">
      <div class="form-group">
        <label>Username</label>
        <input id="username" type="text" placeholder="admin" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="password" type="password" placeholder="any password" autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" id="login-btn">Sign In</button>
      <div class="error" id="error-msg"></div>
    </form>
  </div>

  <script src="/_shared/auth.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      const errorEl = document.getElementById('error-msg');

      btn.disabled = true;
      btn.textContent = 'Signing in...';
      errorEl.style.display = 'none';

      try {
        await auth.login(username, password);
        window.location.href = '/';
      } catch (e) {
        errorEl.textContent = e.message || 'Login failed';
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
