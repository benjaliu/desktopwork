<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat — DesktopWork</title>
  <link rel="stylesheet" href="/_shared/styles.css">
</head>
<body>
  <div id="app">
    <div id="sidebar">
      <div class="logo">DesktopWork</div>
      <nav>
        <a href="/">Dashboard</a>
        <a href="/chat" class="active">Chat</a>
        <a href="/settings">Settings</a>
      </nav>
      <div class="status"><span class="dot"></span>Ready</div>
    </div>
    <div id="main" style="display:flex;flex-direction:column;">
      <div id="chat-messages"></div>
      <div id="chat-input-area">
        <textarea id="chat-input" placeholder="Type a message..." rows="1"></textarea>
        <button class="btn btn-primary" id="send-btn">Send</button>
      </div>
    </div>
  </div>

  <script src="/_shared/auth.js"></script>
  <script src="/_shared/config.js"></script>
  <script src="/_shared/agent.js"></script>
  <script>
    async function init() {
      if (!window.auth.getToken()) {
        window.location.href = '/auth/login.html';
        return;
      }

      const messagesEl = document.getElementById('chat-messages');
      const inputEl = document.getElementById('chat-input');
      const sendBtn = document.getElementById('send-btn');
      let streamingBubble = null;

      function addMessage(role, content) {
        const div = document.createElement('div');
        div.className = `message ${role}`;
        div.innerHTML = `
          <div class="avatar">${role === 'user' ? '👤' : '🤖'}</div>
          <div class="bubble">${escapeHtml(content)}</div>
        `;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return div;
      }

      function addStreamingBubble() {
        const div = document.createElement('div');
        div.className = 'message assistant streaming';
        div.innerHTML = `
          <div class="avatar">🤖</div>
          <div class="bubble"><span class="bubble-text"></span><span class="cursor">▋</span></div>
        `;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return div;
      }

      function escapeHtml(text) {
        return String(text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      function appendToBubble(bubble, delta) {
        const textSpan = bubble.querySelector('.bubble-text');
        textSpan.textContent += delta;
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function finalizeBubble(bubble, content) {
        bubble.querySelector('.cursor')?.remove();
        bubble.querySelector('.bubble-text').textContent = content;
      }

      function setInputEnabled(enabled) {
        inputEl.disabled = !enabled;
        sendBtn.disabled = !enabled;
        sendBtn.textContent = enabled ? 'Send' : 'Sending...';
      }

      async function sendMessage() {
        const message = inputEl.value.trim();
        if (!message) return;
        inputEl.value = '';
        addMessage('user', message);
        setInputEnabled(false);

        const bubble = addStreamingBubble();
        let fullText = '';

        try {
          await window.agent.chat(message, {
            onDelta(delta) {
              appendToBubble(bubble, delta);
              fullText += delta;
            },
            onEnd(content) {
              finalizeBubble(bubble, content || fullText);
              setInputEnabled(true);
            },
            onError(err) {
              bubble.querySelector('.cursor')?.remove();
              bubble.querySelector('.bubble-text').textContent = `Error: ${err}`;
              setInputEnabled(true);
            },
          });
        } catch (e) {
          bubble.querySelector('.cursor')?.remove();
          bubble.querySelector('.bubble-text').textContent = `Error: ${e.message}`;
          setInputEnabled(true);
        }
      }

      sendBtn.addEventListener('click', sendMessage);
      inputEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      inputEl.focus();
    }

    init();
  </script>
</body>
</html>
